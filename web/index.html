<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="komi_fe">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>komi_fe</title>
  <link rel="manifest" href="manifest.json">

  <!--
    Google Maps JavaScript API.
    Se carga ANTES de flutter_bootstrap.js para que `google.maps` esté
    disponible cuando google_maps_flutter_web inicialice el widget GoogleMap
    y cuando places_helper.js use google.maps.places.
  -->
  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD4bfGj7Hu1b5hHTfVY_NnLwt6PB2DvORA&libraries=places&loading=async"
    defer></script>
  <script src="places_helper.js" defer></script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
