name: Deploy Flutter Web SPA to S3 + CloudFront

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "GitHub Environment to use (must exist in repo settings)"
        required: true
        type: choice
        options:
          - qa
          - prod
  push:
    branches:
      - main
      - qa
    paths:
      - "lib/**"
      - "web/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - ".github/workflows/deploy-web-spa.yml"

permissions:
  contents: read

concurrency:
  group: deploy-web-spa-${{ github.ref }}-${{ inputs.environment || (github.ref_name == 'main' && 'prod' || 'qa') }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy SPA
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || (github.ref_name == 'main' && 'prod' || 'qa') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Flutter Web (SPA)
        run: flutter build web --release

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy static assets to S3
        run: |
          aws s3 sync build/web "s3://${{ secrets.S3_BUCKET_NAME }}" \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload index.html with no-cache
        run: |
          aws s3 cp build/web/index.html "s3://${{ secrets.S3_BUCKET_NAME }}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
